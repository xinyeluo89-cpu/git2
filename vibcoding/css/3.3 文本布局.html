<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .left{
            text-align: left;
        }
        .center{
            text-align: center;
        }
        .right{
            text-align: right;
        } 
        .text-indent{
            text-indent: 2em;
        }
        .box{
            width: 200px;
            height: 200px;
            letter-spacing: 2px; 
            line-height: 2;
        }
    </style>
</head>
<body>
    text-align属性用于设置文本的水平对齐方式。
    它可以应用于块级元素和行内块级元素。常用的取值有：
  
    <div class="center text-indent">
        <p>center</p>
    </div>
    <div class="box">
        <p>box</p>
    </div>
</body>
</html>
