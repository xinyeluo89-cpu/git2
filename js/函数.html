<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    
    // 定义一个递归函数 aaa，接收参数 c
    function aaa(c)
    {   if(c===3){return;}
        c++
        aaa(c)
        document.write(c);   
    }
    // 初始化变量 c 为 0
    let c=0
    // 使用 for 循环调用函数 aaa 三次，传入参数 i
    for(let i=0;i<3;i++){aaa(i)}
    
    </script>
</body>
</html>
