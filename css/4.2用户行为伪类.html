<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      .box {
        width: 200px;
        height: 200px;
        background-color: #2c3a58;
        border: 1px solid #ccc;
        text-align: center;
        line-height: 200px;
      }  
      .box:hover {
        background-color: red;
      }
      .selected {
        width: 100px;
        height: 50px;
        border: 2px solid #000;
        transition: width 0.5s ease;
        background-color: blue;
      }
      .selected:focus {
        width: 200px;
        height: 50px;
        outline: none;
        box-shadow: 0 0 5px #000;
        background-color: beige;
      }
    </style>
</head>
<body>
    <div class="box">
        <p>Hover over me!</p>
    </div>
    <input type="text" class="selected">
</body>
</html>
