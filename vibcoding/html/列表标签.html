<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>无序列表</h1>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>   
    <h1>有序列表</h1>
    <ol>            
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
    <h1>描述列表</h1>
    <dl>
        <dt>术语1</dt>
        <dd>定义1</dd>
        <dt>术语2</dt>
        <dd>定义2</dd>
    </dl>
</body>
</html>
