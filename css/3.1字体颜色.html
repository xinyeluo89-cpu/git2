<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .pink{
            color: pink;
        }
        .color16
        {
            color: #ff69b4;
        }
        .rgb
        {
            color: rgb(255, 105, 180);
        }
        .rgba
        {
            color: rgba(255, 105, 180, 0.5);
        }
    </style>
</head>
<body>
    <p>字体颜色：color:</p>
    <!-- 1.颜色值关键字  -->
     <p class="pink">粉色</p>
    <!-- 2.十六进制 -->
    <p class="color16">浅粉色</p>
    <!-- 3.rgb -->
    <p class="rgb">浅粉色</p>
    <!-- 4.rgba -->
     <p class="rgba">浅粉色</p>

</body>
</html>
