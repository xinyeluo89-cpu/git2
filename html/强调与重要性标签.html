<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>强调与重要性标签</h1>
    加强：<strong>这是加强标签</strong>
    倾斜：<em>这是倾斜标签</em>
    下划线：<u>这是下划线标签</u>
    斜体：<i>这是斜体标签</i>
    加粗：<b>这是加粗标签</b>
    代码：<code>这是代码标签</code>
    删除线：<s>这是删除线标签</s>
    删除线：<del>这是删除线标签</del>
    <h2>其他标签</h2>
    注释：<!-- 这是注释 -->

</body>
</html>
