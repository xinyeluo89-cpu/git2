<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>块级元素和内联元素</h1>
    <p>块级元素：块级元素占据一行，宽度和高度根据内容自动调整，可以包含其他块级元素和内联元素。</p>
    <strong>内联元素：内联元素占据一行，宽度和高度根据内容自动调整，只能包含其他内联元素。</strong>
    <p>特殊的情况：段落p中的文本可以包含内联元素，但不能包含块级元素。</p>
</body>
</html>
